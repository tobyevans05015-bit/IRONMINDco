<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Iron Mind">
<meta name="theme-color" content="#0a0a0a">
<title>Iron Mind</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{
  background:#0a0a0a;
  font-family:'Cormorant Garamond',serif;
  color:#c9a84c;
  min-height:100vh;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.marble{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    repeating-linear-gradient(105deg,transparent,transparent 80px,rgba(201,168,76,0.025) 81px),
    repeating-linear-gradient(75deg,transparent,transparent 100px,rgba(201,168,76,0.015) 101px),
    radial-gradient(ellipse at 15% 50%,rgba(201,168,76,0.04) 0%,transparent 60%),
    radial-gradient(ellipse at 85% 50%,rgba(201,168,76,0.04) 0%,transparent 60%),
    #0d0d0d;
}
.app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:1.5rem 1rem 6rem;}

/* HEADER */
.header{text-align:center;margin-bottom:1.5rem;}
.header h1{font-family:'Cinzel',serif;font-size:24px;font-weight:700;letter-spacing:5px;color:#c9a84c;text-transform:uppercase;}
.gold-line{width:100px;height:1px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);margin:10px auto;}
.header .sub{font-size:12px;letter-spacing:3px;color:rgba(201,168,76,0.45);font-style:italic;}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1.5rem;}
.stat-card{background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.2);border-radius:6px;padding:10px 8px;text-align:center;}
.stat-val{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:#c9a84c;display:block;}
.stat-lbl{font-size:10px;letter-spacing:2px;color:rgba(201,168,76,0.4);text-transform:uppercase;margin-top:2px;display:block;}

/* PILLARS */
.pillars-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:1.5rem;}
.pillar-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;}
.pillar-card{
  width:100%;
  background:linear-gradient(180deg,#1a1a1a 0%,#111 100%);
  border:1px solid rgba(201,168,76,0.25);
  border-radius:4px;padding:10px 5px;
  cursor:pointer;position:relative;overflow:hidden;
  transition:border-color 0.2s,transform 0.1s;
  -webkit-user-select:none;user-select:none;
}
.pillar-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);}
.pillar-card:active{transform:scale(0.95);}
.pillar-card.selected{border-color:rgba(201,168,76,0.7);}
.pillar-icon{font-size:20px;color:#c9a84c;text-align:center;margin-bottom:5px;display:block;}
.pillar-name{font-family:'Cinzel',serif;font-size:8px;letter-spacing:1.5px;color:#c9a84c;text-align:center;text-transform:uppercase;display:block;margin-bottom:8px;line-height:1.4;}
.xp-bar-bg{width:100%;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-bottom:3px;}
.xp-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#8b6914,#c9a84c,#f0d080);transition:width 0.5s cubic-bezier(0.4,0,0.2,1);}
.xp-label{font-size:9px;color:rgba(201,168,76,0.5);text-align:center;display:block;font-family:'Cinzel',serif;}
.level-badge{font-family:'Cinzel',serif;font-size:8px;color:#0a0a0a;background:#c9a84c;border-radius:2px;padding:2px 5px;letter-spacing:1px;text-align:center;display:block;}

/* TOTAL XP */
.total-row{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;}
.total-lbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:rgba(201,168,76,0.45);white-space:nowrap;}
.total-bg{flex:1;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
.total-fill{height:100%;background:linear-gradient(90deg,#8b6914,#c9a84c);transition:width 0.5s cubic-bezier(0.4,0,0.2,1);}
.total-val{font-family:'Cinzel',serif;font-size:9px;color:#c9a84c;white-space:nowrap;}

/* TASKS */
.section-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:rgba(201,168,76,0.5);text-transform:uppercase;margin-bottom:10px;}
.task-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1.5rem;}
.task-btn{
  background:rgba(201,168,76,0.04);
  border:1px solid rgba(201,168,76,0.15);
  border-radius:4px;padding:12px 12px;
  cursor:pointer;display:flex;align-items:center;gap:10px;
  transition:background 0.15s,border-color 0.15s;
  width:100%;text-align:left;
  -webkit-user-select:none;user-select:none;
}
.task-btn:active{background:rgba(201,168,76,0.15);}
.task-btn.done{opacity:0.35;pointer-events:none;}
.task-check{font-size:18px;color:rgba(201,168,76,0.3);flex-shrink:0;}
.task-btn.done .task-check{color:#c9a84c;}
.task-info{flex:1;}
.task-text{font-family:'Cormorant Garamond',serif;font-size:15px;color:rgba(201,168,76,0.85);display:block;line-height:1.3;}
.task-pillar-tag{font-family:'Cinzel',serif;font-size:9px;color:rgba(201,168,76,0.35);letter-spacing:1px;margin-top:2px;display:block;}
.task-xp{font-family:'Cinzel',serif;font-size:10px;color:rgba(201,168,76,0.4);flex-shrink:0;}

/* LEVEL UP FLASH */
.levelup-overlay{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(10,10,10,0.92);
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.levelup-overlay.show{opacity:1;pointer-events:all;}
.levelup-title{font-family:'Cinzel',serif;font-size:28px;font-weight:700;color:#c9a84c;letter-spacing:6px;text-align:center;margin-bottom:8px;}
.levelup-sub{font-family:'Cormorant Garamond',serif;font-size:16px;color:rgba(201,168,76,0.6);letter-spacing:3px;font-style:italic;text-align:center;}
.levelup-line{width:160px;height:1px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);margin:16px auto;}

/* TOAST */
.toast{
  position:fixed;bottom:30px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:#c9a84c;color:#0a0a0a;
  font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;
  padding:10px 24px;border-radius:3px;
  transition:transform 0.3s ease;z-index:100;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* RESET COUNTDOWN */
.reset-row{text-align:center;margin-bottom:1rem;}
.reset-lbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:rgba(201,168,76,0.3);}
</style>
</head>
<body>
<div class="marble"></div>

<div class="app">
  <div class="header">
    <h1>Iron Mind</h1>
    <div class="gold-line"></div>
    <div class="sub">Five Pillars of Mastery</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <span class="stat-val" id="statStreak">0</span>
      <span class="stat-lbl">Day Streak</span>
    </div>
    <div class="stat-card">
      <span class="stat-val" id="statTotal">0</span>
      <span class="stat-lbl">Total XP</span>
    </div>
    <div class="stat-card">
      <span class="stat-val" id="statDone">0/8</span>
      <span class="stat-lbl">Today</span>
    </div>
  </div>

  <div class="pillars-grid" id="pillarsGrid"></div>

  <div class="total-row">
    <span class="total-lbl">XP</span>
    <div class="total-bg"><div class="total-fill" id="totalFill" style="width:0%"></div></div>
    <span class="total-val" id="totalVal">0</span>
  </div>

  <div class="reset-row">
    <span class="reset-lbl">Resets in <span id="countdown">--:--:--</span></span>
  </div>

  <div class="section-title">Daily Trials</div>
  <div class="task-list" id="taskList"></div>
</div>

<div class="levelup-overlay" id="levelupOverlay">
  <div class="levelup-title" id="levelupTitle">LEVEL UP</div>
  <div class="levelup-line"></div>
  <div class="levelup-sub" id="levelupSub">Mind · Level 2</div>
</div>

<div class="toast" id="toast"></div>

<script>
const PILLARS = [
  {id:'mind',   name:'Mind',    icon:'ti-brain'},
  {id:'body',   name:'Body',    icon:'ti-barbell'},
  {id:'shadow', name:'Shadow',  icon:'ti-yin-yang'},
  {id:'wealth', name:'Wealth',  icon:'ti-coin'},
  {id:'purpose',name:'Purpose', icon:'ti-flame'},
];

const TASKS = [
  {text:'Morning sunlight (10 mins)',    pillar:'body',    xp:15},
  {text:'Train hard',                    pillar:'body',    xp:25},
  {text:'Cold exposure',                 pillar:'body',    xp:20},
  {text:'Deep reading (20 mins)',         pillar:'mind',    xp:20},
  {text:'Meditation (10 mins)',          pillar:'mind',    xp:15},
  {text:'Journal your shadow',           pillar:'shadow',  xp:20},
  {text:'Work on Iron Mind',             pillar:'purpose', xp:25},
  {text:'Track finances',                pillar:'wealth',  xp:15},
];

const XP_PER_LEVEL = 100;

function getLevel(xp){return Math.floor(xp/XP_PER_LEVEL)+1;}
function getProgress(xp){return((xp%XP_PER_LEVEL)/XP_PER_LEVEL)*100;}

function loadState(){
  try{
    const raw=localStorage.getItem('ironmind_v1');
    if(!raw)return null;
    return JSON.parse(raw);
  }catch(e){return null;}
}

function defaultState(){
  return{
    pillars:{mind:0,body:0,shadow:0,wealth:0,purpose:0},
    streak:0,
    lastCompleteDate:'',
    doneTasks:[],
    lastResetDate:'',
  };
}

function saveState(s){
  localStorage.setItem('ironmind_v1',JSON.stringify(s));
}

function todayStr(){
  const d=new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

let state=loadState()||defaultState();

// Daily reset check
const today=todayStr();
if(state.lastResetDate!==today){
  // Streak logic
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yStr=yesterday.getFullYear()+'-'+(yesterday.getMonth()+1)+'-'+yesterday.getDate();
  if(state.lastCompleteDate===yStr){
    state.streak=(state.streak||0);
  } else if(state.lastResetDate&&state.lastResetDate!==yStr){
    state.streak=0;
  }
  state.doneTasks=[];
  state.lastResetDate=today;
  saveState(state);
}

function totalXP(){return Object.values(state.pillars).reduce((a,b)=>a+b,0);}

function renderPillars(){
  const grid=document.getElementById('pillarsGrid');
  grid.innerHTML=PILLARS.map(p=>{
    const xp=state.pillars[p.id]||0;
    const prog=Math.round(getProgress(xp));
    const lv=getLevel(xp);
    return`<div class="pillar-wrap">
      <div class="pillar-card" onclick="pillarTap('${p.id}')">
        <i class="ti ${p.icon} pillar-icon" aria-hidden="true"></i>
        <span class="pillar-name">${p.name}</span>
        <div class="xp-bar-bg"><div class="xp-bar-fill" style="width:${prog}%"></div></div>
        <span class="xp-label">${xp}</span>
      </div>
      <span class="level-badge">LV ${lv}</span>
    </div>`;
  }).join('');
}

function renderTasks(){
  const list=document.getElementById('taskList');
  list.innerHTML=TASKS.map((t,i)=>{
    const done=state.doneTasks.includes(i);
    const pName=PILLARS.find(p=>p.id===t.pillar)?.name||t.pillar;
    return`<button class="task-btn${done?' done':''}" onclick="completeTask(${i})">
      <i class="ti ${done?'ti-circle-check':'ti-circle'} task-check" aria-hidden="true"></i>
      <span class="task-info">
        <span class="task-text">${t.text}</span>
        <span class="task-pillar-tag">${pName.toUpperCase()} · +${t.xp} XP</span>
      </span>
    </button>`;
  }).join('');
}

function renderStats(){
  const total=totalXP();
  document.getElementById('statStreak').textContent=state.streak;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statDone').textContent=state.doneTasks.length+'/'+TASKS.length;
  const pct=Math.min(Math.round((total/500)*100),100);
  document.getElementById('totalFill').style.width=pct+'%';
  document.getElementById('totalVal').textContent=total+' XP';
}

let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}

function showLevelUp(pillarName,level){
  const ov=document.getElementById('levelupOverlay');
  document.getElementById('levelupTitle').textContent='LEVEL UP';
  document.getElementById('levelupSub').textContent=pillarName+' · Level '+level;
  ov.classList.add('show');
  setTimeout(()=>ov.classList.remove('show'),2500);
}

function completeTask(i){
  if(state.doneTasks.includes(i))return;
  const task=TASKS[i];
  const prevLevel=getLevel(state.pillars[task.pillar]||0);
  state.pillars[task.pillar]=(state.pillars[task.pillar]||0)+task.xp;
  const newLevel=getLevel(state.pillars[task.pillar]);
  state.doneTasks.push(i);
  // Streak — if all tasks done today
  if(state.doneTasks.length===TASKS.length){
    state.streak=(state.streak||0)+1;
    state.lastCompleteDate=today;
  }
  saveState(state);
  if(newLevel>prevLevel){
    const pName=PILLARS.find(p=>p.id===task.pillar)?.name||task.pillar;
    showLevelUp(pName,newLevel);
  } else {
    showToast('+'+task.xp+' XP · '+(PILLARS.find(p=>p.id===task.pillar)?.name||task.pillar));
  }
  renderPillars();renderTasks();renderStats();
}

function pillarTap(id){
  const xp=state.pillars[id]||0;
  const lv=getLevel(xp);
  const name=PILLARS.find(p=>p.id===id)?.name||id;
  showToast(name.toUpperCase()+' · LV '+lv+' · '+xp+' XP');
}

// Countdown to midnight
function updateCountdown(){
  const now=new Date();
  const midnight=new Date();midnight.setHours(24,0,0,0);
  const diff=midnight-now;
  const h=Math.floor(diff/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  document.getElementById('countdown').textContent=
    String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

setInterval(updateCountdown,1000);
updateCountdown();
renderPillars();renderTasks();renderStats();
</script>
</body>
</html>
